<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ashtrix - Product Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-charcoal: #0b0b0b;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            overflow-x: hidden; /* Prevents horizontal scroll */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-charcoal);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Orbs */
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); z-index: -1; }
        .orb-left { top: -10%; left: -10%; width: 60vw; height: 60vw; background: #ff4d94; opacity: 0.3; }
        .orb-right { top: 50%; transform: translateY(-50%); right: -10%; width: 60vw; height: 60vw; background: #ff8c69; opacity: 0.4; }
        .orb-center { bottom: -10%; left: -10%; width: 60vw; height: 60vw; background: #c3a6ff; opacity: 0.2; }

        /* Header */
        header {
            position: sticky; top: 0; left: 0; width: 100%; height: 70px; padding: 0 2rem;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            background: rgba(73, 42, 58, 0.8); backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-logo {
            font-family: 'Syncopate', sans-serif; font-size: 1.5rem; font-weight: 700;
            text-decoration: none; letter-spacing: 0.2em; color: #ffffff; text-transform: uppercase;
        }

        /* Main Content */
        .hero-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 40px 20px; position: relative; z-index: 1;
        }

        .glass-card {
            background: rgba(20, 10, 20, 0.6);
            backdrop-filter: blur(50px) saturate(180%);
            padding: 3rem; border-radius: 42px;
            max-width: 1000px; width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
            color: #ffffff;
        }

        /* Product Details Layout */
        .detail-wrapper {
            display: flex; flex-wrap: wrap; gap: 40px; align-items: center; text-align: left;
        }

        .detail-image-col { flex: 1; min-width: 300px; }
        .detail-image-col img {
            width: 100%; border-radius: 20px; aspect-ratio: 1; object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .detail-info-col { flex: 1; min-width: 300px; display: flex; flex-direction: column; justify-content: center; }

        .p-category { text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; opacity: 0.7; margin-bottom: 10px; display: block; }
        .p-name { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; line-height: 1.1; }
        .p-price { font-size: 2rem; font-weight: 800; margin-bottom: 20px; color: #ff4d94; }
        
        .detail-section { margin-bottom: 25px; }
        .detail-section h3 { font-size: 1rem; margin-bottom: 10px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }
        
        .color-options { display: flex; gap: 15px; }
        .color-circle {
            width: 35px; height: 35px; border-radius: 50%; 
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer; 
            transition: all 0.3s ease-in-out;
            background-color: var(--swatch-color);
        }
        .color-circle:hover { 
            transform: scale(1.15); 
            border-color: var(--swatch-color);
            box-shadow: 0 0 10px var(--swatch-color);
        }
        .color-circle.selected { 
            transform: scale(1.15); 
            border-color: #fff; 
            box-shadow: 0 0 15px var(--swatch-color);
        }

        .size-options { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .size-box {
            width: 45px; height: 45px;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; 
            transition: all 0.3s ease-in-out; 
            border-radius: 12px; font-weight: 600;
            color: rgba(255,255,255,0.7);
            background: transparent;
        }
        .size-box:hover { 
            transform: scale(1.1); 
            border-color: rgba(255,255,255,0.8);
            color: #fff;
        }
        .size-box.selected { 
            border-color: #fff; 
            color: #fff; 
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .type-options { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .type-box {
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; 
            transition: all 0.3s ease; 
            border-radius: 12px; font-weight: 600;
            color: rgba(255,255,255,0.7);
            background: transparent;
        }
        .type-box:hover { 
            transform: scale(1.05); 
            border-color: rgba(255,255,255,0.8);
            color: #fff;
        }
        .type-box.selected { 
            border: 1.5px solid #fff; 
            color: #fff; 
            font-weight: 700;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .qty-selector { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 30px; width: fit-content; }
        .qty-btn {
            width: 30px; height: 30px; background: transparent; border: none;
            color: #fff; cursor: pointer; font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease-in-out;
        }
        .qty-btn:hover { transform: scale(1.2); }
        .qty-btn:active { transform: scale(0.9); }
        .qty-input {
            width: 40px; background: transparent; border: none; color: #fff;
            text-align: center; font-size: 1.2rem; font-weight: 700; outline: none;
        }

        .primary-btn {
            display: block; width: 100%; background: #ffffff; color: #000000; padding: 16px 40px;
            border-radius: 50px; font-weight: 700; text-decoration: none; text-transform: uppercase;
            letter-spacing: 0.5px; text-align: center;
            transition: transform 0.2s; cursor: pointer; border: none; font-size: 1rem;
        }
        .primary-btn:hover { transform: scale(1.02); }

        .primary-btn-wrapper {
            margin-top: 10px;
        }

        .sticky-btn-container { display: none; }

        /* Nav Icons */
        .corner-nav { display: flex; gap: 12px; }
        .nav-icon {
            width: 42px; height: 42px; border-radius: 50%; background: rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center; color: #ffffff;
            backdrop-filter: blur(5px); border: 0.5px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease; text-decoration: none;
        }
        .nav-icon:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
        .nav-icon svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

        @media (max-width: 768px) {
            body {
                padding-bottom: 100px; /* Space for sticky button */
            }
            .glass-card {
                padding: 2rem 1.5rem;
                border-radius: 24px;
            }
            .detail-wrapper {
                flex-direction: column;
                gap: 2rem;
            }
            .p-name { font-size: 2rem; }
            .p-price { font-size: 1.8rem; }

            /* Larger touch targets for mobile */
            .color-circle { width: 40px; height: 40px; }
            .size-box { width: 50px; height: 50px; }
            .type-box { padding: 12px 22px; }

            .primary-btn-wrapper { display: none; }

            /* Show and style the sticky button container for mobile */
            .sticky-btn-container {
                display: flex;
                gap: 1rem;
                position: fixed;
                bottom: 0; left: 0; width: 100%;
                padding: 1rem 1.5rem;
                background: linear-gradient(to top, var(--bg-charcoal) 50%, transparent);
                z-index: 1001;
            }
            .sticky-btn-container .primary-btn {
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <div class="orb orb-left"></div>
    <div class="orb orb-right"></div>
    <div class="orb orb-center"></div>

    <header>
        <a href="index.html" class="brand-logo">Ashtrix</a>
        <div class="corner-nav">
            <a href="index.html" class="nav-icon" aria-label="Home">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <a href="cart.html" class="nav-icon" aria-label="Cart">
                <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            </a>
        </div>
    </header>

    <main class="hero-container">
        <div class="glass-card">
            <div class="detail-wrapper" id="product-content">
                <!-- Content injected by JS -->
            </div>
        </div>
    </main>

    <div class="sticky-btn-container">
        <button class="primary-btn" onclick="addToCart()">Add to Cart</button>
        <button class="primary-btn" style="background-color: #25D366;" onclick="buyNow()">
            Buy Now
        </button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const products = JSON.parse(localStorage.getItem('ashtrix_products')) || [];
        const product = products.find(p => p.id == productId);
        const container = document.getElementById('product-content');
        let selectedColor = null;
        let selectedSize = null;
        let selectedType = null;

        function updateCartCount() {
            const cart = JSON.parse(sessionStorage.getItem('ashtrix_cart')) || [];
            const badge = document.querySelector('.cart-badge');
            if(badge) badge.innerText = cart.length;
        }
        updateCartCount();

        if (product) {
            // Generate Color Circles
            let colorHtml = '';
            if (product.colors) {
                const colors = product.colors.split(',').map(c => c.trim());
                colorHtml = colors.map(color => 
                    `<div class="color-circle" style="--swatch-color: ${color.toLowerCase()};" title="${color}" onclick="selectColor(this, '${color}')"></div>`
                ).join('');
            } else {
                colorHtml = '<span style="opacity:0.6;">Standard</span>';
            }

            container.innerHTML = `
                <div class="detail-image-col">
                    <img src="${product.image}" alt="${product.name}">
                </div>
                <div class="detail-info-col">
                    <span class="p-category">${product.category}</span>
                    <h1 class="p-name">${product.name}</h1>
                    <div class="p-price">₹${product.price}</div>
                    
                    <div class="detail-section">
                        <h3>Available Colors</h3>
                        <div class="color-options">${colorHtml}</div>
                    </div>

                    <div class="detail-section">
                        <h3>T-shirt Type</h3>
                        <div class="type-options">
                            <div class="type-box" onclick="selectType(this)">Normal</div>
                            <div class="type-box" onclick="selectType(this)">Acid Wash</div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3>Select Size</h3>
                        <div class="size-options">
                            <div class="size-box" onclick="selectSize(this)">S</div>
                            <div class="size-box" onclick="selectSize(this)">M</div>
                            <div class="size-box" onclick="selectSize(this)">L</div>
                            <div class="size-box" onclick="selectSize(this)">XL</div>
                            <div class="size-box" onclick="selectSize(this)">XXL</div>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3>Quantity</h3>
                        <div class="qty-selector">
                            <button class="qty-btn" onclick="updateQty(-1)">-</button>
                            <input type="number" id="qtyInput" class="qty-input" value="1" readonly>
                            <button class="qty-btn" onclick="updateQty(1)">+</button>
                        </div>
                    </div>

                    <div class="detail-section">
                        <h3>Description</h3>
                        <p style="opacity: 0.8; line-height: 1.6;">
                            Experience premium comfort with our ${product.name}. Designed for style and durability, this ${product.category.toLowerCase()} is perfect for your everyday wardrobe.
                        </p>
                    </div>

                    <div class="primary-btn-wrapper">
                        <button class="primary-btn" onclick="addToCart()">Add to Cart</button>
                    </div>
                    <div class="primary-btn-wrapper">
                        <button class="primary-btn" style="background-color: #25D366;" onclick="buyNow()">Buy Now (WhatsApp)</button>
                    </div>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div style="width:100%; text-align:center;">
                    <h1>Product not found</h1>
                    <a href="index.html" class="primary-btn" style="margin-top:20px;">Go Back Home</a>
                </div>
            `;
        }

        function selectColor(element, color) {
            document.querySelectorAll('.color-circle').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedColor = color;
        }

        function selectType(element) {
            document.querySelectorAll('.type-box').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedType = element.innerText;
        }

        function selectSize(element) {
            document.querySelectorAll('.size-box').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedSize = element.innerText;
        }

        function updateQty(change) {
            const input = document.getElementById('qtyInput');
            let val = parseInt(input.value) + change;
            if (val < 1) val = 1;
            input.value = val;
        }

        function addToCart() {
            if (product.colors && !selectedColor) {
                alert('Please select a color');
                return;
            }
            if (!selectedType) {
                alert('Please select a T-shirt type');
                return;
            }
            if (!selectedSize) {
                alert('Please select a size');
                return;
            }

            const cartItem = {
                id: product.id,
                name: product.name,
                price: product.price,
                image: product.image,
                color: selectedColor || 'Standard',
                type: selectedType,
                size: selectedSize,
                quantity: parseInt(document.getElementById('qtyInput').value)
            };

            try {
                let cart = JSON.parse(sessionStorage.getItem('ashtrix_cart')) || [];
                cart.push(cartItem);
                sessionStorage.setItem('ashtrix_cart', JSON.stringify(cart));
                
                alert('Added to cart!');
                window.location.href = 'cart.html';
            } catch(e) {
                console.error(e);
                alert('Unable to add to cart. Storage might be full.');
            }
        }

        function buyNow() {
            if (product.colors && !selectedColor) {
                alert('Please select a color');
                return;
            }
            if (!selectedType) {
                alert('Please select a T-shirt type');
                return;
            }
            if (!selectedSize) {
                alert('Please select a size');
                return;
            }

            const quantity = parseInt(document.getElementById('qtyInput').value);

            const params = new URLSearchParams({
                buyNow: true,
                name: product.name,
                price: product.price,
                quantity: quantity,
                color: selectedColor || 'Standard',
                type: selectedType,
                size: selectedSize,
            });

            window.location.href = `checkout.html?${params.toString()}`;
        }
    </script>
</body>
</html>

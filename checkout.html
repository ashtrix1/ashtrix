<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ashtrix - Checkout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-charcoal: #0b0b0b;
            --text-primary: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            overflow-x: hidden; /* Prevents horizontal scroll */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-charcoal);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Orbs */
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); z-index: -1; }
        .orb-left { top: -10%; left: -10%; width: 60vw; height: 60vw; background: #ff4d94; opacity: 0.3; }
        .orb-right { top: 50%; transform: translateY(-50%); right: -10%; width: 60vw; height: 60vw; background: #ff8c69; opacity: 0.4; }

        /* Header */
        header {
            position: sticky; top: 0; left: 0; width: 100%; height: 70px; padding: 0 2rem;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            background: rgba(73, 42, 58, 0.8); backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-logo {
            font-family: 'Syncopate', sans-serif; font-size: 1.5rem; font-weight: 700;
            text-decoration: none; letter-spacing: 0.2em; color: #ffffff; text-transform: uppercase;
        }

        /* Main Content */
        .hero-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; padding: 40px 20px; position: relative; z-index: 1;
        }

        .glass-card {
            background: rgba(20, 10, 20, 0.6);
            backdrop-filter: blur(50px) saturate(180%);
            padding: 3rem; border-radius: 42px;
            max-width: 600px; width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
            color: #ffffff;
        }

        h1 { font-size: 2rem; font-weight: 900; margin-bottom: 2rem; text-align: center; }
        h2 { font-size: 1.2rem; margin-bottom: 1rem; margin-top: 1.5rem; opacity: 0.9; }

        .form-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 600; opacity: 0.8; }
        input {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1); color: #fff; font-family: inherit; outline: none;
            transition: 0.3s;
        }
        input:focus { background: rgba(255,255,255,0.2); border-color: #fff; }

        .payment-options { display: flex; gap: 10px; flex-direction: column; }
        .payment-option {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px;
            transition: 0.2s;
        }
        .payment-option:hover { background: rgba(255,255,255,0.1); }
        .payment-option input { width: auto; margin: 0; }

        .summary-row {
            display: flex; justify-content: space-between; margin-top: 2rem;
            padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 1.2rem; font-weight: 800;
        }

        .pay-btn {
            display: block; width: 100%; background: #ffffff; color: #000000;
            padding: 16px; border-radius: 50px; font-weight: 700; border: none;
            text-transform: uppercase; letter-spacing: 0.5px;
            cursor: pointer; transition: transform 0.2s ease; font-size: 1rem;
        }
        .pay-btn:hover { transform: scale(1.02); }

        .pay-btn-wrapper { margin-top: 2rem; }
        .sticky-btn-container { display: none; }

        /* Nav Icons */
        .corner-nav { display: flex; gap: 12px; }
        .nav-icon {
            width: 42px; height: 42px; border-radius: 50%; background: rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center; color: #ffffff;
            backdrop-filter: blur(5px); border: 0.5px solid rgba(255, 255, 255, 0.3);
            text-decoration: none;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            display: none; /* Hidden by default */
            align-items: center; justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            position: relative;
            background: #2D0B1E;
            color: #fff;
            padding: 2rem;
            border-radius: 14px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .modal-close {
            position: absolute; top: 10px; right: 10px; background: #d1d1d6;
            border: none; width: 28px; height: 28px; border-radius: 50%;
            font-size: 1rem; line-height: 28px; text-align: center; cursor: pointer;
            color: #8e8e93; transition: background-color 0.2s ease;
        }
        .modal-close:hover { background-color: #c7c7cc; }
        #qrcode-container {
            padding: 20px; background: white; border-radius: 8px;
            display: inline-block; margin: 1rem 0;
            min-height: 200px; /* Ensure space for retry button */
            min-width: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Order Placed Overlay */
        #order-placed-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 4000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #order-placed-overlay.visible {
            display: flex;
            opacity: 1;
        }
        .order-placed-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 4vw;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            animation: fadeInScale 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            text-align: center;
            padding: 1rem;
        }
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Retry Button Style */
        .retry-btn {
            background: #ff4d94; color: white; padding: 12px 24px;
            border: none; border-radius: 8px; font-weight: 600;
            cursor: pointer; font-size: 1rem;
        }

        @media (max-width: 768px) {
            body {
                padding-bottom: 100px;
            }
            .glass-card {
                padding: 2rem 1.5rem;
                margin-bottom: 2rem;
            }
            .pay-btn-wrapper {
                display: none;
            }
            .sticky-btn-container {
                display: block;
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                padding: 1rem 1.5rem;
                background: linear-gradient(to top, var(--bg-charcoal) 50%, transparent);
                z-index: 1001;
            }
        }
    </style>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs/qrcode.min.js"></script>
</head>
<body>

    <div class="orb orb-left"></div>
    <div class="orb orb-right"></div>

    <header>
        <a href="index.html" class="brand-logo">Ashtrix</a>
        <div class="corner-nav">
            <a href="index.html" class="nav-icon" aria-label="Home">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <a href="cart.html" class="nav-icon" aria-label="Cart">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            </a>
        </div>
    </header>

    <main class="hero-container">
        <div class="glass-card">
            <h1>Checkout</h1>
            <form id="checkoutForm">
                <h2>Shipping Details</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" required placeholder="+91 9876543210">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address" required placeholder="Street Address">
                </div>
                <div class="form-group">
                    <label>City</label>
                    <input type="text" id="city" required placeholder="City">
                </div>
                <div class="form-group">
                    <label>Zip Code</label>
                    <input type="text" id="zip" required placeholder="123456">
                </div>

                <h2>Payment Method</h2>
                <div class="payment-options">
                    <label class="payment-option">
                        <input type="radio" name="payment" value="UPI" checked>
                        <span>UPI (GPay, PhonePe, Paytm)</span>
                    </label>
                </div>

                <div class="summary-row">
                    <span>Total to Pay</span>
                    <span id="pay-total">₹0</span>
                </div>

                <div class="pay-btn-wrapper">
                    <button type="submit" class="pay-btn">Proceed to Pay</button>
                </div>
            </form>
        </div>
    </main>

    <div class="sticky-btn-container">
        <button type="submit" form="checkoutForm" class="pay-btn">Proceed to Pay</button>
    </div>

    <div id="upi-qr-modal" class="modal-overlay">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeUpiModal()">&#x2715;</button>
            <h2 style="color: #fff;">Scan to Pay with UPI</h2>
            <div id="qrcode-container">
                <!-- QR or Retry button will be injected here -->
            </div>
            <p style="color: #fff; margin-top: 1rem;">Amount: <strong id="qr-amount"></strong></p>
            <p id="qr-status-msg" style="color: #ccc; font-size: 0.9rem; margin-top: 0.5rem; font-weight: 600;">Generating QR Code...</p>
        </div>
    </div>

    <div id="order-placed-overlay">
        <div class="order-placed-text">Order Placed</div>
    </div>

    <script>
        // --- Main Logic Dispatcher ---
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const isBuyNow = urlParams.get('buyNow') === 'true';

            if (isBuyNow) {
                setupWhatsAppCheckout(urlParams);
            } else {
                setupCartCheckout();
            }
        });

        // --- WhatsApp "Buy Now" Flow ---
        function setupWhatsAppCheckout(urlParams) {
            const productName = urlParams.get('name');
            const price = parseFloat(urlParams.get('price'));
            const quantity = parseInt(urlParams.get('quantity'));
            const size = urlParams.get('size');
            const color = urlParams.get('color');
            const type = urlParams.get('type');

            if (!productName) {
                alert('Product details not found. Returning to home.');
                window.location.href = 'index.html';
                return;
            }

            const total = price * quantity;

            // Update UI for WhatsApp flow
            document.querySelector('h1').innerText = 'WhatsApp Order';
            document.getElementById('pay-total').innerText = '₹' + total;
            
            document.querySelector('h2:nth-of-type(2)').innerText = 'Payment Preference';
            const paymentOptions = document.querySelector('.payment-options');
            paymentOptions.innerHTML = `
                <label class="payment-option">
                    <input type="radio" name="payment" value="Pay on Delivery" checked>
                    <span>Pay on Delivery</span>
                </label>
                <label class="payment-option">
                    <input type="radio" name="payment" value="UPI">
                    <span>UPI (I will pay separately)</span>
                </label>
            `;

            document.querySelectorAll('.pay-btn').forEach(btn => btn.innerText = 'Place Order on WhatsApp');

            // Add submit handler for WhatsApp
            document.getElementById('checkoutForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const name = document.getElementById('name').value;
                const phone = document.getElementById('phone').value;
                const address = document.getElementById('address').value;
                const city = document.getElementById('city').value;
                const zip = document.getElementById('zip').value;
                const paymentType = document.querySelector('input[name="payment"]:checked').value;

                if (!name || !phone || !address || !city || !zip) {
                    alert('Please fill in all shipping details.');
                    return;
                }

                const phoneRegex = /^\d{10}$/;
                if (!phoneRegex.test(phone)) {
                    alert('Please enter a valid 10-digit Indian phone number.');
                    return;
                }

                const message = `New Order from Ashtrix!\n---------------------\nProduct: ${productName}\nSize: ${size}\nColor: ${color}\nType: ${type}\nQuantity: ${quantity}\nTotal: ₹${total}\n---------------------\nCustomer Details:\nName: ${name}\nPhone: ${phone}\nAddress: ${address}, ${city}, ${zip}\n---------------------\nPayment: ${paymentType}`;

                const whatsappNumber = '919750548113';
                const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

                window.location.href = whatsappUrl;
            });
        }


        // --- Razorpay Cart Checkout Flow (Existing Logic) ---
        let pollingInterval; // Keep global for this flow

        function setupCartCheckout() {
            const cart = JSON.parse(sessionStorage.getItem('ashtrix_cart')) || [];
            if (cart.length === 0) {
                alert('Your cart is empty!');
                window.location.href = 'index.html';
                return;
            }

            let subtotal = 0;
            cart.forEach(item => { subtotal += item.price * item.quantity; });
            const total = subtotal;
            document.getElementById('pay-total').innerText = '₹' + total;

            document.getElementById('checkoutForm').addEventListener('submit', function(e) {
                e.preventDefault();
                handleUpiPayment(total, cart);
            });
        }

        function handleUpiPayment(total, cart) {
            const newOrder = {
                id: '#ORD-' + Math.floor(1000 + Math.random() * 9000),
                customer: document.getElementById('name').value,
                items: cart.map(i => `${i.quantity}x ${i.name} (${i.size}${i.type ? ', ' + i.type : ''})`).join(', '),
                total: '₹' + total,
                status: 'Pending',
                date: new Date().toLocaleDateString(),
                details: { 
                    phone: document.getElementById('phone').value, 
                    address: document.getElementById('address').value, 
                    city: document.getElementById('city').value, 
                    zip: document.getElementById('zip').value, 
                    paymentMethod: 'UPI QR'
                }
            };

            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

            const payBtn = document.querySelector('.pay-btn');
            payBtn.innerText = "Generating QR...";
            payBtn.disabled = true;

            document.getElementById('qr-amount').innerText = '₹' + total;
            document.getElementById('upi-qr-modal').classList.add('active');
            document.getElementById('qrcode-container').innerHTML = '';
            document.getElementById('qr-status-msg').innerText = 'Generating QR Code...';

            fetch('/create-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: total, note: `Order ${newOrder.id}` })
            })
            .then(res => res.json())
            .then(data => {
                payBtn.disabled = false;
                payBtn.innerText = "Proceed to Pay";

                if (data.success) {
                    const upiLink = data.payload;
                    const qrId = data.qr_id;
                    const qrImageUrl = data.image_url;

                    if (isMobile) {
                        window.location.href = upiLink;
                    } else {
                        const qrContainer = document.getElementById('qrcode-container');
                        qrContainer.innerHTML = `<img src="${qrImageUrl}" alt="Scan to Pay" style="width: 200px; height: 200px; border-radius: 8px;" onerror="showQrError()">`;

                        const statusMsg = document.getElementById('qr-status-msg');
                        statusMsg.innerText = "Scan with any UPI App";
                        statusMsg.style.color = "#ccc";

                        startPolling(qrId, newOrder);
                    }
                } else {
                    showQrError(true, data.error);
                }
            })
            .catch(err => {
                console.error(err);
                showQrError(true, "Network error. Please check your connection.");
            });
        }

        function showQrError(isServerError = false, message = "QR image failed to load. Please retry.") {
            const qrContainer = document.getElementById('qrcode-container');
            const statusMsg = document.getElementById('qr-status-msg');
            
            qrContainer.innerHTML = `<button class="retry-btn" onclick="handleUpiPayment()">Retry</button>`;
            statusMsg.innerText = isServerError ? message : "QR image failed to load. Please retry.";
            statusMsg.style.color = "#ff4d94";
        }

        function startPolling(qrId, newOrder) {
            const statusMsg = document.getElementById('qr-status-msg');
            
            pollingInterval = setInterval(() => {
                fetch(`/check-status/${qrId}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === 'captured') {
                            clearInterval(pollingInterval);
                            statusMsg.innerText = "Payment Successful!";
                            statusMsg.style.color = "#28a745";
                            setTimeout(() => confirmPayment(newOrder), 1000);
                        } else if (data.status === 'error') {
                            clearInterval(pollingInterval);
                            statusMsg.innerText = "Verification failed. Please contact support.";
                            statusMsg.style.color = "#ff4d94";
                        }
                    })
                    .catch(console.error);
            }, 2000);
        }

        function closeUpiModal() {
            document.getElementById('upi-qr-modal').classList.remove('active');
            if (pollingInterval) clearInterval(pollingInterval);
            const payBtn = document.querySelector('.pay-btn');
            payBtn.disabled = false;
            payBtn.innerText = "Proceed to Pay";
        }

        function confirmPayment(newOrder) {
            closeUpiModal();
            const overlay = document.getElementById('order-placed-overlay');
            overlay.classList.add('visible');

            setTimeout(() => {
                let orders = JSON.parse(localStorage.getItem('ashtrix_orders')) || [];
                orders.unshift(newOrder);
                localStorage.setItem('ashtrix_orders', JSON.stringify(orders));

                sessionStorage.removeItem('ashtrix_cart');

                // Redirect after a delay to let user see "ORDER PLACED"
                setTimeout(() => {
                    window.location.href = `order-confirmation.html?orderId=${newOrder.id}`;
                }, 2500);
            }, 500);
        }
    </script>
</body>
</html>

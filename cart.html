<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ashtrix - Cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-charcoal: #0b0b0b;
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-x: hidden; /* Prevents horizontal scroll */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-charcoal);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Background Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
        }
        .orb-left {
            top: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: #ff4d94;
            opacity: 0.3;
        }
        .orb-right {
            top: 50%;
            transform: translateY(-50%);
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: #ff8c69;
            opacity: 0.4;
        }
        .orb-center {
            bottom: -10%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: #c3a6ff;
            opacity: 0.2;
        }

        /* Header Design */
        header {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(73, 42, 58, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.2em;
            color: #ffffff;
            background: transparent;
            -webkit-background-clip: unset;
            -webkit-text-fill-color: #ffffff;
            filter: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            text-transform: uppercase;
        }

        .brand-logo:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        /* Hero Section */
        .hero-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .glass-card {
            background: rgba(20, 10, 20, 0.6);
            backdrop-filter: blur(50px) saturate(180%);
            -webkit-backdrop-filter: blur(50px) saturate(180%);
            padding: 3rem;
            border-radius: 42px;
            text-align: center;
            max-width: 900px;
            width: 100%;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
            color: #ffffff;
        }

        h1 {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            line-height: 1.1;
        }

        /* Cart Styles */
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }

        .cart-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .item-thumb {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.1);
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
        }

        .item-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
            color: #fff;
        }

        .item-variant {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 0.3rem;
        }

        .item-price {
            font-weight: 700;
            color: #fff;
        }

        .cart-summary {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 1rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .summary-row.total {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 0;
        }

        .checkout-btn {
            display: block;
            background: #ffffff;
            color: #000000;
            padding: 16px;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2rem;
            transition: transform 0.2s ease;
        }

        .checkout-btn:hover {
            transform: scale(1.02);
        }

        /* Corner Nav */
        .corner-nav {
            display: flex;
            flex-direction: row;
            gap: 12px;
        }

        .nav-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 0.5px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            text-decoration: none;
        }

        .nav-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .nav-icon svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .cart-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #ff4d94;
            color: #ffffff;
            font-size: 10px;
            font-weight: 800;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ffffff;
        }

        @media (max-width: 768px) {
            header { padding: 0 1.5rem; }
            .glass-card { padding: 2rem 1.5rem; }
            .cart-item { flex-direction: column; align-items: flex-start; gap: 1rem; position: relative; }
            .item-info { width: 100%; }
            .cart-item button { position: absolute; top: 0; right: 0; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="orb orb-left"></div>
    <div class="orb orb-right"></div>
    <div class="orb orb-center"></div>

    <header>
        <a href="index.html" class="brand-logo">Ashtrix</a>
        <div class="corner-nav">
            <a href="index.html" class="nav-icon" aria-label="Home">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </a>
            <a href="support.html" class="nav-icon" aria-label="Support">
                <svg viewBox="0 0 24 24"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
            </a>
            <a href="cart.html" class="nav-icon" aria-label="Cart">
                <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span class="cart-badge">2</span>
            </a>
        </div>
    </header>

    <main class="hero-container">
        <div class="glass-card">
            <h1>Your Cart</h1>
            
            <div class="cart-items" id="cart-container"></div>

            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">₹0</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="cart-total">₹0</span>
                </div>
            </div>

            <a href="checkout.html" class="checkout-btn">Proceed to Checkout</a>
        </div>
    </main>

    <script>
        function loadCart() {
            const cart = JSON.parse(sessionStorage.getItem('ashtrix_cart')) || [];
            const container = document.getElementById('cart-container');
            const subtotalEl = document.getElementById('cart-subtotal');
            const totalEl = document.getElementById('cart-total');
            const summaryEl = document.querySelector('.cart-summary');
            const checkoutBtn = document.querySelector('.checkout-btn');
            
            // Update badge
            document.querySelector('.cart-badge').innerText = cart.length;

            if (cart.length === 0) {
                container.innerHTML = '<div style="padding: 2rem; opacity: 0.7; text-align: center;">Your cart is empty.</div>';
                if(summaryEl) summaryEl.style.display = 'none';
                if(checkoutBtn) checkoutBtn.style.display = 'none';
                return;
            }
            
            if(summaryEl) summaryEl.style.display = 'block';
            if(checkoutBtn) checkoutBtn.style.display = 'block';

            let subtotal = 0;
            container.innerHTML = cart.map((item, index) => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                return `
                    <div class="cart-item">
                        <div class="item-thumb" style="background-image: url('${item.image}');"></div>
                        <div class="item-info">
                            <div class="item-title">${item.name}</div>
                            <div class="item-variant">Size: ${item.size} • Color: ${item.color} ${item.type ? `• Type: ${item.type}` : ''}</div>
                            <div class="item-price">₹${item.price} x ${item.quantity}</div>
                        </div>
                        <button onclick="removeItem(${index})" style="background:none; border:none; color:#ff4d94; cursor:pointer; font-size:1.2rem;">&times;</button>
                    </div>
                `;
            }).join('');

            subtotalEl.innerText = '₹' + subtotal;
            totalEl.innerText = '₹' + subtotal;
        }

        function removeItem(index) {
            let cart = JSON.parse(sessionStorage.getItem('ashtrix_cart'));
            cart.splice(index, 1);
            sessionStorage.setItem('ashtrix_cart', JSON.stringify(cart));
            loadCart();
        }

        loadCart();
    </script>

</body>
</html>
